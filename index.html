<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissor Game</title>
  <meta charset="UTF-8"/>
</head>
<body>

<script>

//picks a random value from the list
function computerPlay() {
	let Options = ['rock', 'paper', 'scissors'];
	return Options[Math.floor(Math.random()*Options.length)];
 }

//defines what happens when player and computer choices are compared
function playRound(playerSelection, computerSelection) {
	 if (playerSelection == computerSelection){
		return "Tie!!!"}
	 else if (	(computerSelection == 'rock' && playerSelection == 'scissors')||
           		(computerSelection == 'paper' && playerSelection == 'rock')||
           		(computerSelection == 'scissors' && playerSelection == 'paper') ){
			return "You Lose!!!"}
	
	 else if (	(computerSelection == 'rock' && playerSelection == 'paper')||
           		(computerSelection == 'paper' && playerSelection == 'scissors')||
           		(computerSelection == 'scissors' && playerSelection == 'rock') ){
			return "You Win!!!"}
	 else{		return "Please choose rock, paper, or scissors"}
		
	}

function game() {
	playerSelection = ""; //sets the input as a string
	for (let i=0; i < 5; i++){ //iterates thru the list (starts at 1, goes to five, increments by 1
	playerSelection = window.prompt("Rock, Paper, or Scissors?").toLowerCase(); //prompts and makes lowercase
	computerSelection = computerPlay(); //assigns variable to function result
	console.log("Your Choice:", playerSelection.toUpperCase()); //prints out results to console
	console.log("Computer Choice:", computerSelection.toUpperCase());
	console.log(playRound(playerSelection,computerSelection));}
	}	


game();	//runs the game function when the page loads




</script>



</body>
</html>
